name: GooseNotes
options:
  bundleIdPrefix: com.eachann
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CLANG_ENABLE_MODULES: YES
    ENABLE_DEBUG_DYLIB: NO
    ENABLE_HARDENED_RUNTIME: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  GooseNotes:
    type: application
    platform: macOS
    sources:
      - path: GooseNotes/Sources
      - path: GooseNotes/Resources/Assets.xcassets
        buildPhase: resources
      - path: GooseNotes/Resources/Web
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eachann.goose-notes
        PRODUCT_NAME: GooseNotes
        INFOPLIST_FILE: GooseNotes/Info.plist
        CODE_SIGN_ENTITLEMENTS: GooseNotes/GooseNotes.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    scheme:
      gatherCoverageData: true
      testTargets:
        - GooseNotesTests
  GooseNotesTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/GooseNotesTests
      - path: GooseNotes/Sources/Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eachann.goose-notes.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: ""
        BUNDLE_LOADER: ""
